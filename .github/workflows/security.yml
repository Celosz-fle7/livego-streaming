name: Security

on:
  push:
    branches: [pro-v2]
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Soft Secret Scan
        run: |
          echo "soft security scan"
          grep -R "SECRET\|TOKEN\|API_KEY" . --exclude-dir=.git || true
          echo "security scan completed"

name: Pro Pack

on:
  push:
    branches: [pro-v2]

jobs:

  cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: lscpu

  memory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: free -h

  disk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: df -h

  kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: uname -r

  workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ls .github/workflows

  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find .github/workflows -name "*.yml"

  gitlog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git log --oneline -5

  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find . -name "*.tmp" -delete || true

  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git ls-files > backup.txt

  success:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "pro pack stable"

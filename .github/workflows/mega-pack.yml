name: Mega Pack

on:
  push:
    branches: [pro-v2]

jobs:

  env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: env | head

  path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo $PATH

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: which bash

  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ps aux | head

  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: dpkg -l | head

  hidden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find . -name ".*"

  logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find . -name "*.log" || true

  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find . -mtime +30 || true

  github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -d .github

  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "mega pack success"

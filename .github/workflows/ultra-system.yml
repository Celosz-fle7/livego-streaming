name: Ultra System

on:
  push:
    branches:
      - pro-v2

  workflow_dispatch:

jobs:

  cpu-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: lscpu

  memory-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: free -h

  kernel-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: uname -r

  permission-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ls -lah

  hidden-file-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find . -name ".*"

  yaml-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find .github/workflows -name "*.yml"

  branch-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git fetch
          git status

  stale-file-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find . -mtime +30 || true

  shell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: which bash

  git-config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --list

  path-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo $PATH

  process-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ps aux | head

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: dpkg -l | head

  github-env-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: env | grep GITHUB

  root-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: whoami

  workflow-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ls .github/workflows | wc -l

  network-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ip addr || true

  storage-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: du -sh .

  final-ultra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "ultra stabilization success"

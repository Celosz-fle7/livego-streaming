name: Network Pack

on:
  push:
    branches: [pro-v2]

jobs:

  hostname:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: hostname

  ip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ip addr || true

  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ping -c 2 github.com || true

  dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cat /etc/resolv.conf

  route:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ip route || true

  socket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ss -tuln || true

  curl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: curl -I https://github.com || true

  wget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: wget --spider https://github.com || true

  connectivity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "network stable"

  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "network pack success"

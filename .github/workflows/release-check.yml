name: Release Check

on:
  push:
    branches:
      - pro-v2

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Branch
        run: |
          echo "branch: $GITHUB_REF"

      - name: Validate Workflow
        run: |
          ls .github/workflows

      - name: Validate Project
        run: |
          echo "project ready"

      - name: Release Status
        run: |
          echo "release candidate ok"

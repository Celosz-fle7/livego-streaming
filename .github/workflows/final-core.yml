name: Final Core

on:
  push:
    branches:
      - pro-v2

  workflow_dispatch:

jobs:

  validate-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "repo validation"
          pwd
          ls -la

  validate-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          test -d .github
          test -d .github/workflows

  validate-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo $GITHUB_REF_NAME

  validate-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git fetch origin
          git status

  validate-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          grep -R "SECRET" . --exclude-dir=.git || true
          grep -R "TOKEN" . --exclude-dir=.git || true

  validate-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          uname -a
          free -h

  validate-storage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          df -h
          du -sh .

  validate-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          find . -maxdepth 2

  validate-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "monitor active"

  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "release stable"

  validate-final:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "livego-streaming fully stabilized"

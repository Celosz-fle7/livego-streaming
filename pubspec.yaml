name: livego_streaming
description: LiveGO Streaming App - Nonton drama pendek gratis
publish_to: 'none'
version: 5.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Network
  http: ^1.1.0
  crypto: ^3.0.3

  # Image & Video
  cached_network_image: ^3.3.1
  video_player: ^2.8.6

  # Database & Storage
  sqflite: ^2.3.3
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3

  # Utils
  url_launcher: ^6.2.6

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
